<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Racing Game 3D - WebGL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Segoe UI',sans-serif}
canvas{display:block}
#hud{position:fixed;top:20px;left:50%;transform:translateX(-50%);color:#fff;font-size:26px;font-weight:700;text-shadow:0 2px 8px #000;pointer-events:none;letter-spacing:2px}
#speedbar{position:fixed;bottom:30px;left:30px;color:rgba(255,255,255,.8);font-size:14px}
#speedval{font-size:36px;font-weight:700;color:#0af}
#gameover{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;text-align:center;display:none;background:rgba(0,0,0,.7);padding:40px 60px;border-radius:20px;border:2px solid #f44}
#gameover h1{font-size:52px;color:#f44;text-shadow:0 0 30px #f00;margin-bottom:10px}
#gameover p{font-size:22px;margin:8px 0}
#controls{position:fixed;bottom:20px;right:20px;color:rgba(255,255,255,.5);font-size:13px;text-align:right;line-height:1.8}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">🏎 Score: <span id="score">0</span></div>
<div id="speedbar"><div style="opacity:.6;font-size:12px">SPEED</div><div id="speedval">0</div><div style="opacity:.6;font-size:12px">km/h</div></div>
<div id="gameover">
  <h1>GAME OVER!</h1>
  <p>Score: <strong id="finalscore">0</strong></p>
  <p style="margin-top:16px;font-size:18px;color:#aaa">Nhấn <kbd style="background:#333;padding:2px 8px;border-radius:4px;color:#fff">R</kbd> để chơi lại</p>
</div>
<div id="controls">W / ↑ &nbsp;Gas<br>S / ↓ &nbsp;Brake<br>A / ← &nbsp;Left<br>D / → &nbsp;Right<br>R &nbsp;Restart</div>

<script src="https://cdn.jsdelivr.net/npm/gl-matrix@3.4.3/gl-matrix-min.js"></script>
<script>
// ================================================================
// WebGL Racing Game — ported from C++/OpenGL
// Mirrors: main.cpp · Car.cpp · Camera.cpp · shader.vs · shader.fs
// ================================================================
const {mat4,vec3,glMatrix:glM}=glMatrix;
glM.setMatrixArrayType(Array);

const canvas=document.getElementById('c');
const gl=canvas.getContext('webgl2');
if(!gl){alert('Trình duyệt không hỗ trợ WebGL 2!');}

function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;if(gl)gl.viewport(0,0,canvas.width,canvas.height);}
window.addEventListener('resize',resize);resize();

// ── Shaders (same logic as shader.vs / shader.fs) ───────────────
const VS=`#version 300 es
layout(location=0)in vec3 aPos;
layout(location=1)in vec3 aNormal;
out vec3 FragPos;out vec3 Normal;
uniform mat4 model,view,projection;
void main(){
  FragPos=vec3(model*vec4(aPos,1.0));
  Normal=mat3(transpose(inverse(mat3(model))))*aNormal;
  gl_Position=projection*view*vec4(FragPos,1.0);
}`;
const FS=`#version 300 es
precision mediump float;
out vec4 FragColor;
in vec3 Normal,FragPos;
uniform vec3 lightPos,viewPos,lightColor,objectColor;
void main(){
  vec3 ambient=0.35*lightColor;
  vec3 norm=normalize(Normal);
  vec3 lDir=normalize(lightPos-FragPos);
  vec3 diffuse=max(dot(norm,lDir),0.0)*lightColor;
  vec3 vDir=normalize(viewPos-FragPos);
  vec3 rDir=reflect(-lDir,norm);
  vec3 specular=0.5*pow(max(dot(vDir,rDir),0.0),32.0)*lightColor;
  FragColor=vec4((ambient+diffuse+specular)*objectColor,1.0);
}`;

function mkShader(type,src){
  const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(s));return null;}
  return s;
}
const prog=gl.createProgram();
gl.attachShader(prog,mkShader(gl.VERTEX_SHADER,VS));
gl.attachShader(prog,mkShader(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);gl.useProgram(prog);

const uModel=gl.getUniformLocation(prog,'model');
const uView=gl.getUniformLocation(prog,'view');
const uProj=gl.getUniformLocation(prog,'projection');
const uLP=gl.getUniformLocation(prog,'lightPos');
const uVP=gl.getUniformLocation(prog,'viewPos');
const uLC=gl.getUniformLocation(prog,'lightColor');
const uOC=gl.getUniformLocation(prog,'objectColor');

function setM4(loc,m){gl.uniformMatrix4fv(loc,false,m);}
function setV3(loc,x,y,z){gl.uniform3f(loc,x,y,z);}

// ── Cube geometry (same as vertices[] in main.cpp) ───────────────
const verts=new Float32Array([
  -0.5,-0.5,-0.5, 0,0,-1,  0.5,-0.5,-0.5, 0,0,-1,  0.5,0.5,-0.5, 0,0,-1,
   0.5, 0.5,-0.5, 0,0,-1, -0.5,0.5,-0.5, 0,0,-1, -0.5,-0.5,-0.5, 0,0,-1,
  -0.5,-0.5, 0.5, 0,0,1,   0.5,-0.5,0.5, 0,0,1,   0.5,0.5,0.5, 0,0,1,
   0.5, 0.5, 0.5, 0,0,1,  -0.5,0.5,0.5, 0,0,1,  -0.5,-0.5,0.5, 0,0,1,
  -0.5, 0.5, 0.5,-1,0,0, -0.5,0.5,-0.5,-1,0,0, -0.5,-0.5,-0.5,-1,0,0,
  -0.5,-0.5,-0.5,-1,0,0, -0.5,-0.5,0.5,-1,0,0,  -0.5,0.5,0.5,-1,0,0,
   0.5, 0.5, 0.5, 1,0,0,  0.5,0.5,-0.5, 1,0,0,   0.5,-0.5,-0.5, 1,0,0,
   0.5,-0.5,-0.5, 1,0,0,  0.5,-0.5,0.5, 1,0,0,   0.5,0.5,0.5, 1,0,0,
  -0.5,-0.5,-0.5, 0,-1,0, 0.5,-0.5,-0.5, 0,-1,0,  0.5,-0.5,0.5, 0,-1,0,
   0.5,-0.5, 0.5, 0,-1,0,-0.5,-0.5,0.5, 0,-1,0, -0.5,-0.5,-0.5, 0,-1,0,
  -0.5, 0.5,-0.5, 0,1,0,  0.5,0.5,-0.5, 0,1,0,   0.5,0.5,0.5, 0,1,0,
   0.5, 0.5, 0.5, 0,1,0, -0.5,0.5,0.5, 0,1,0,  -0.5,0.5,-0.5, 0,1,0,
]);
const VAO=gl.createVertexArray(),VBO=gl.createBuffer();
gl.bindVertexArray(VAO);
gl.bindBuffer(gl.ARRAY_BUFFER,VBO);
gl.bufferData(gl.ARRAY_BUFFER,verts,gl.STATIC_DRAW);
gl.vertexAttribPointer(0,3,gl.FLOAT,false,24,0);gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(1,3,gl.FLOAT,false,24,12);gl.enableVertexAttribArray(1);

function drawCube(){gl.drawArrays(gl.TRIANGLES,0,36);}

// ── Car (mirrors Car.cpp) ────────────────────────────────────────
const car={
  pos:[0,0.5,0],yaw:0,speed:0,
  maxSpeed:40,accel:20,decel:10,turnSpeed:120,
  size:[1,1,2]
};
function resetCar(){car.pos=[0,0.5,0];car.yaw=0;car.speed=0;}

function carUpdate(dt,fb,lr){
  if(fb===1) car.speed+=car.accel*dt;
  else if(fb===-1) car.speed-=car.accel*dt;
  else{
    if(car.speed>0){car.speed-=car.decel*dt;if(car.speed<0)car.speed=0;}
    else if(car.speed<0){car.speed+=car.decel*dt;if(car.speed>0)car.speed=0;}
  }
  car.speed=Math.max(-car.maxSpeed/2,Math.min(car.maxSpeed,car.speed));
  if(Math.abs(car.speed)>0.1){
    const tm=car.speed>0?1:-1;
    if(lr===1) car.yaw+=car.turnSpeed*dt*tm;
    else if(lr===-1) car.yaw-=car.turnSpeed*dt*tm;
  }
  const yr=car.yaw*Math.PI/180;
  car.pos[0]+=Math.sin(yr)*car.speed*dt;
  car.pos[2]+=Math.cos(yr)*car.speed*dt;
  
  // Giới hạn xe trong đường
  const roadHalfWidth = 9.5; 
  const carHalfWidth = car.size[0] / 2;
  if(car.pos[0] < -roadHalfWidth + carHalfWidth) car.pos[0] = -roadHalfWidth + carHalfWidth;
  if(car.pos[0] > roadHalfWidth - carHalfWidth) car.pos[0] = roadHalfWidth - carHalfWidth;
}

function carBase(){
  const m=mat4.create();
  mat4.translate(m,m,car.pos);
  mat4.rotateY(m,m,car.yaw*Math.PI/180);
  return m;
}

function drawCar(){
  const b=carBase(),s=car.size;
  let m;
  const part=(tx,ty,tz,sx,sy,sz,r,g,bv)=>{
    m=mat4.clone(b);mat4.translate(m,m,[tx,ty,tz]);mat4.scale(m,m,[sx,sy,sz]);
    setM4(uModel,m);setV3(uOC,r,g,bv);drawCube();
  };
  // Body
  part(0,s[1]/2,0,         s[0],s[1],s[2],         0.05,0.25,0.75);
  // Hood
  part(0,s[1]+0.01,s[2]*.22, s[0],.05,s[2]*.5,     0.04,0.18,0.55);
  // Cabin
  part(0,s[1]+.38,-.15,    s[0]*.82,.55,s[2]*.48,  0.04,0.18,0.55);
  // Windshield
  part(0,s[1]+.42,s[2]*.08,s[0]*.75,.42,.12,        0.4,0.85,0.95);
  // Rear window
  part(0,s[1]+.42,-s[2]*.30,s[0]*.70,.38,.10,       0.3,0.75,0.85);
  // Racing stripe
  part(0,s[1]+.67,-.15,    .18,.03,s[2]*.47,        1,1,1);
  // Front bumper
  part(0,s[1]*.3,s[2]*.52, s[0],s[1]*.35,.12,       0.6,0.6,0.65);
  // Rear bumper
  part(0,s[1]*.3,-s[2]*.52,s[0],s[1]*.35,.12,       0.55,0.55,0.60);
  // Left headlight
  part(-s[0]*.3,s[1]*.65,s[2]*.51,.25,.18,.08,      1.0,0.95,0.3);
  // Right headlight
  part( s[0]*.3,s[1]*.65,s[2]*.51,.25,.18,.08,      1.0,0.95,0.3);
  // Left tail light
  part(-s[0]*.3,s[1]*.65,-s[2]*.51,.25,.18,.08,     1.0,0.1,0.1);
  // Right tail light
  part( s[0]*.3,s[1]*.65,-s[2]*.51,.25,.18,.08,     1.0,0.1,0.1);
  // Wheels
  const wR=.42,wT=.22,wX=s[0]/2+wT/2,wZf=s[2]*.34,wZr=-s[2]*.34;
  const wp=[[-wX,0,wZf],[wX,0,wZf],[-wX,0,wZr],[wX,0,wZr]];
  for(let i=0;i<4;i++){
    part(wp[i][0],wp[i][1],wp[i][2], wT,wR,wR, .12,.12,.12);
    const hx=wp[i][0]+(i%2===0?-(wT*.55):(wT*.55));
    part(hx,wp[i][1],wp[i][2], .06,wR*.65,wR*.65, .75,.75,.78);
  }
}

// ── Camera (mirrors Camera.cpp) ─────────────────────────────────
const cam={pos:[0,4,-8],target:[0,0,12],up:[0,1,0],dist:8,height:3.5};
function camUpdate(){
  const yr=car.yaw*Math.PI/180;
  cam.pos=[car.pos[0]-Math.sin(yr)*cam.dist, car.pos[1]+cam.height, car.pos[2]-Math.cos(yr)*cam.dist];
  cam.target=[car.pos[0]+Math.sin(yr)*12, car.pos[1]+.8, car.pos[2]+Math.cos(yr)*12];
}
function getView(){const v=mat4.create();mat4.lookAt(v,cam.pos,cam.target,cam.up);return v;}

// ── Obstacles ────────────────────────────────────────────────────
const COLORS=[[1,.45,0],[.85,.08,.08],[.95,.85,.05],[.9,.3,0]];
let obstacles=[],spawnZ=20;

function spawnObstacle(){
  const c=COLORS[Math.floor(Math.random()*4)];
  obstacles.push({
    pos:[Math.random()*16-8,1.25,spawnZ],
    size:[1.8+Math.random()*3,2.5+Math.random()*2,1.5+Math.random()*2],
    color:c
  });
  spawnZ+=25+Math.random()*30;
}
function initObstacles(){obstacles=[];spawnZ=20;for(let i=0;i<4;i++)spawnObstacle();}

function drawObstacles(){
  for(const o of obstacles){
    let m=mat4.create();mat4.translate(m,m,o.pos);mat4.scale(m,m,o.size);
    setM4(uModel,m);setV3(uOC,...o.color);drawCube();
    m=mat4.create();mat4.translate(m,m,[o.pos[0],-.3,o.pos[2]]);
    mat4.scale(m,m,[o.size[0]*1.1,.25,o.size[2]*1.1]);
    setM4(uModel,m);setV3(uOC,.1,.1,.1);drawCube();
  }
}

function checkCollision(o){
  const[cx,,cz]=car.pos,[cw,,cd]=car.size;
  const[ox,,oz]=o.pos,[ow,,od]=o.size;
  return cx+cw/2>=ox-ow/2&&ox+ow/2>=cx-cw/2&&cz+cd/2>=oz-od/2&&oz+od/2>=cz-cd/2;
}

// ── Environment ──────────────────────────────────────────────────
function drawEnv(){
  const cz=car.pos[2];
  let m;
  // Road
  m=mat4.create();mat4.translate(m,m,[0,-.5,cz+50]);mat4.scale(m,m,[20,1,400]);
  setM4(uModel,m);setV3(uOC,.15,.15,.15);drawCube();
  // Grass L
  m=mat4.create();mat4.translate(m,m,[-30,-.5,cz+50]);mat4.scale(m,m,[40,1,400]);
  setM4(uModel,m);setV3(uOC,.15,.42,.15);drawCube();
  // Grass R
  m=mat4.create();mat4.translate(m,m,[30,-.5,cz+50]);mat4.scale(m,m,[40,1,400]);
  setM4(uModel,m);setV3(uOC,.15,.42,.15);drawCube();
  // Lane markings
  const startZ=Math.floor(cz/10)*10-20;
  for(let z=startZ;z<startZ+200;z+=10){
    m=mat4.create();mat4.translate(m,m,[-3.3,-.4,z]);mat4.scale(m,m,[.3,1,4]);
    setM4(uModel,m);setV3(uOC,1,1,1);drawCube();
    m=mat4.create();mat4.translate(m,m,[3.3,-.4,z]);mat4.scale(m,m,[.3,1,4]);
    setM4(uModel,m);setV3(uOC,1,1,1);drawCube();
  }
  // Road edge lines (yellow)
  m=mat4.create();mat4.translate(m,m,[-9.5,-.39,cz+50]);mat4.scale(m,m,[.2,1,400]);
  setM4(uModel,m);setV3(uOC,1,.85,0);drawCube();
  m=mat4.create();mat4.translate(m,m,[9.5,-.39,cz+50]);mat4.scale(m,m,[.2,1,400]);
  setM4(uModel,m);setV3(uOC,1,.85,0);drawCube();
}

// ── Input ────────────────────────────────────────────────────────
const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

// ── Game state ───────────────────────────────────────────────────
let gameOver=false,score=0,lastTime=0;

function resetGame(){
  gameOver=false;score=0;
  resetCar();initObstacles();
  document.getElementById('gameover').style.display='none';
}
initObstacles();

// ── Render loop ──────────────────────────────────────────────────
gl.enable(gl.DEPTH_TEST);

function frame(ts){
  requestAnimationFrame(frame);
  const dt=Math.min((ts-lastTime)/1000,.05);lastTime=ts;

  if(!gameOver){
    // Input
    const fb=(keys['KeyW']||keys['ArrowUp'])?1:(keys['KeyS']||keys['ArrowDown'])?-1:0;
    const lr=(keys['KeyA']||keys['ArrowLeft'])?1:(keys['KeyD']||keys['ArrowRight'])?-1:0;
    carUpdate(dt,fb,lr);
    score=Math.max(0,Math.floor(car.pos[2]));
    document.getElementById('score').textContent=score;
    document.getElementById('speedval').textContent=Math.abs(Math.floor(car.speed*3.6));

    // Spawn
    if(car.pos[2]+200>spawnZ) spawnObstacle();
    // Cleanup
    obstacles=obstacles.filter(o=>o.pos[2]>car.pos[2]-30);
    // Collision
    for(const o of obstacles){
      if(checkCollision(o)){
        gameOver=true;
        document.getElementById('finalscore').textContent=score;
        document.getElementById('gameover').style.display='block';
        break;
      }
    }
  }

  if(keys['KeyR']&&gameOver) resetGame();

  camUpdate();

  // Clear — sky blue
  gl.clearColor(.53,.72,.85,1);
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  gl.useProgram(prog);
  gl.bindVertexArray(VAO);

  // Matrices
  const proj=mat4.create();
  mat4.perspective(proj,45*Math.PI/180,canvas.width/canvas.height,.1,500);
  setM4(uProj,proj);
  setM4(uView,getView());

  // Lighting
  setV3(uLP,10,20,car.pos[2]+10);
  setV3(uVP,...cam.pos);
  setV3(uLC,1,1,1);

  drawEnv();
  drawCar();
  drawObstacles();
}
requestAnimationFrame(frame);
</script>
</body>
</html>
