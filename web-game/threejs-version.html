<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Racing Game 3D - Three.js</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Segoe UI',sans-serif}
canvas{display:block}
#hud{position:fixed;top:20px;left:50%;transform:translateX(-50%);color:#fff;font-size:26px;font-weight:700;text-shadow:0 2px 8px #000;pointer-events:none;letter-spacing:2px}
#speedbar{position:fixed;bottom:30px;left:30px;color:rgba(255,255,255,.8);font-size:14px}
#speedval{font-size:36px;font-weight:700;color:#0af}
#gameover{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;text-align:center;display:none;background:rgba(0,0,0,.7);padding:40px 60px;border-radius:20px;border:2px solid #f44}
#gameover h1{font-size:52px;color:#f44;text-shadow:0 0 30px #f00;margin-bottom:10px}
#gameover p{font-size:22px;margin:8px 0}
#controls{position:fixed;bottom:20px;right:20px;color:rgba(255,255,255,.5);font-size:13px;text-align:right;line-height:1.8}
#lib-badge{position:fixed;top:20px;left:20px;background:#0af;color:#fff;padding:6px 12px;border-radius:20px;font-weight:bold;font-size:14px;box-shadow:0 2px 10px rgba(0,170,255,0.5);}
</style>
</head>
<body>
<div id="lib-badge">Powered by Three.js</div>
<div id="hud">🏎 Score: <span id="score">0</span></div>
<div id="speedbar"><div style="opacity:.6;font-size:12px">SPEED</div><div id="speedval">0</div><div style="opacity:.6;font-size:12px">km/h</div></div>
<div id="gameover">
  <h1>GAME OVER!</h1>
  <p>Score: <strong id="finalscore">0</strong></p>
  <p style="margin-top:16px;font-size:18px;color:#aaa">Nhấn <kbd style="background:#333;padding:2px 8px;border-radius:4px;color:#fff">R</kbd> để chơi lại</p>
</div>
<div id="controls">W / ↑ &nbsp;Gas<br>S / ↓ &nbsp;Brake<br>A / ← &nbsp;Left<br>D / → &nbsp;Right<br>R &nbsp;Restart</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ================================================================
// WebGL Racing Game — Three.js Version
// So sánh với bản pure WebGL: Code nhàn hơn rất nhiều nhờ Three.js 
// tự động xử lý shader, ma trận, geometry, ánh sáng và bóng đổ!
// ================================================================

// ── 1. Setup Cơ Bản ─────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb); // Sky blue
scene.fog = new THREE.Fog(0x87ceeb, 10, 150);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 500);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true; // Three.js bật bóng đổ rất dễ
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── 2. Ánh sáng ──────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.camera.left = -30;
dirLight.shadow.camera.right = 30;
dirLight.shadow.camera.top = 30;
dirLight.shadow.camera.bottom = -30;
dirLight.shadow.camera.far = 100;
dirLight.shadow.mapSize.width = 1024;
dirLight.shadow.mapSize.height = 1024;
scene.add(dirLight);

// ── 3. Xe (Car) ──────────────────────────────────────────────────
const carGroup = new THREE.Group();
const carState = {
    pos: new THREE.Vector3(0, 0.5, 0),
    yaw: 0,
    speed: 0,
    maxSpeed: 40,
    accel: 20,
    decel: 10,
    turnSpeed: 120,
    size: { w: 1, h: 1, d: 2 } // width (x), height (y), depth (z)
};

// Hàm tiện ích tạo các bộ phận xe
function createPart(w, h, d, color, x, y, z) {
    const geo = new THREE.BoxGeometry(w, h, d);
    const mat = new THREE.MeshStandardMaterial({ color: color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    carGroup.add(mesh);
    return mesh;
}

// Xây dựng xe tương tự bản thuần
const bW = carState.size.w;
const bH = carState.size.h;
const bD = carState.size.d;

// Body chính
createPart(bW, bH, bD, 0x0c40c0, 0, bH/2, 0);
// Cabin
createPart(bW*0.82, 0.55, bD*0.48, 0x0c40c0, 0, bH+0.38, -0.15);
// Kính chắn gió
createPart(bW*0.75, 0.42, 0.12, 0x66d9f2, 0, bH+0.42, bD*0.08);
// Kính hậu
createPart(bW*0.70, 0.38, 0.10, 0x4cbfe6, 0, bH+0.42, -bD*0.30);
// Vạch kẻ đua
createPart(0.18, 0.03, bD*0.47, 0xffffff, 0, bH+0.67, -0.15);

// Bánh xe
const wR = 0.42, wT = 0.22, wX = bW/2 + wT/2, wZf = bD*0.34, wZr = -bD*0.34;
const wp = [[-wX, 0, wZf], [wX, 0, wZf], [-wX, 0, wZr], [wX, 0, wZr]];
wp.forEach(pos => {
    createPart(wT, wR, wR, 0x1f1f1f, pos[0], pos[1], pos[2]);
});

scene.add(carGroup);

function updateCar(dt, fb, lr) {
    if (fb === 1) carState.speed += carState.accel * dt;
    else if (fb === -1) carState.speed -= carState.accel * dt;
    else {
        if (carState.speed > 0) { carState.speed -= carState.decel * dt; if (carState.speed < 0) carState.speed = 0; }
        else if (carState.speed < 0) { carState.speed += carState.decel * dt; if (carState.speed > 0) carState.speed = 0; }
    }
    carState.speed = Math.max(-carState.maxSpeed/2, Math.min(carState.maxSpeed, carState.speed));
    
    if (Math.abs(carState.speed) > 0.1) {
        const tm = carState.speed > 0 ? 1 : -1;
        if (lr === 1) carState.yaw += carState.turnSpeed * dt * tm;
        else if (lr === -1) carState.yaw -= carState.turnSpeed * dt * tm;
    }
    
    const yr = carState.yaw * Math.PI / 180;
    carState.pos.x += Math.sin(yr) * carState.speed * dt;
    carState.pos.z += Math.cos(yr) * carState.speed * dt;
    
    // Giới hạn xe không đi xuyên ra khỏi đường (địa hình)
    const roadHalfWidth = 9.5; 
    const carHalfWidth = carState.size.w / 2;
    if (carState.pos.x < -roadHalfWidth + carHalfWidth) carState.pos.x = -roadHalfWidth + carHalfWidth;
    if (carState.pos.x > roadHalfWidth - carHalfWidth) carState.pos.x = roadHalfWidth - carHalfWidth;
    
    carGroup.position.copy(carState.pos);
    carGroup.rotation.y = yr;
}

// ── 4. Môi trường (Road, Grass) ──────────────────────────────────
// Three.js có thể di chuyển texture thay vì tạo hàng trăm khối lập phương
const roadGeo = new THREE.BoxGeometry(20, 1, 400);
const roadMat = new THREE.MeshStandardMaterial({ color: 0x262626 });
const road = new THREE.Mesh(roadGeo, roadMat);
road.position.set(0, -0.5, 0);
road.receiveShadow = true;
scene.add(road);

const grassGeo = new THREE.BoxGeometry(100, 1, 400);
const grassMat = new THREE.MeshStandardMaterial({ color: 0x266b26 });
const grass = new THREE.Mesh(grassGeo, grassMat);
grass.position.set(0, -0.6, 0);
grass.receiveShadow = true;
scene.add(grass);

// Vạch kẻ đường (dùng nhiều mesh nhỏ đưa vào 1 group)
const lineGroup = new THREE.Group();
const lineGeo = new THREE.BoxGeometry(0.3, 1, 4);
const lineMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
for (let i = -10; i < 10; i++) {
    let z = i * 20;
    let lineL = new THREE.Mesh(lineGeo, lineMat);
    lineL.position.set(-3.3, -0.4, z);
    lineL.receiveShadow = true;
    lineGroup.add(lineL);
    
    let lineR = new THREE.Mesh(lineGeo, lineMat);
    lineR.position.set(3.3, -0.4, z);
    lineR.receiveShadow = true;
    lineGroup.add(lineR);
}
scene.add(lineGroup);

function updateEnv() {
    // Di chuyển môi trường theo xe để tạo cảm giác vô tận
    const snapZ = Math.floor(carState.pos.z / 20) * 20;
    road.position.z = carState.pos.z + 50;
    grass.position.z = carState.pos.z + 50;
    lineGroup.position.z = snapZ;
    
    // Đèn chiếu sáng cũng chạy theo xe
    dirLight.position.z = carState.pos.z + 10;
    dirLight.target.position.set(0, 0, carState.pos.z);
    dirLight.target.updateMatrixWorld();
}

// ── 5. Chướng ngại vật (Obstacles) ───────────────────────────────
const COLORS = [0xff7300, 0xd91414, 0xf2d90d, 0xe64d00];
let obstacles = [];
let spawnZ = 20;
const obstacleGeo = new THREE.BoxGeometry(1, 1, 1); // sẽ scale sau

function spawnObstacle() {
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    const mat = new THREE.MeshStandardMaterial({ color: color });
    const mesh = new THREE.Mesh(obstacleGeo, mat);
    
    const size = {
        w: 1.8 + Math.random() * 3,
        h: 2.5 + Math.random() * 2,
        d: 1.5 + Math.random() * 2
    };
    
    mesh.scale.set(size.w, size.h, size.d);
    mesh.position.set(
        Math.random() * 16 - 8,
        size.h / 2, // Đặt nằm trên mặt đường
        spawnZ
    );
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    
    scene.add(mesh);
    obstacles.push({ mesh, size });
    
    spawnZ += 25 + Math.random() * 30;
}

function initObstacles() {
    obstacles.forEach(o => scene.remove(o.mesh));
    obstacles = [];
    spawnZ = 20;
    for(let i=0; i<4; i++) spawnObstacle();
}

function checkCollision(obs) {
    const cx = carState.pos.x, cz = carState.pos.z;
    const cw = carState.size.w, cd = carState.size.d;
    
    const ox = obs.mesh.position.x, oz = obs.mesh.position.z;
    const ow = obs.size.w, od = obs.size.d;
    
    return (cx + cw/2 >= ox - ow/2 && 
            cx - cw/2 <= ox + ow/2 && 
            cz + cd/2 >= oz - od/2 && 
            cz - cd/2 <= oz + od/2);
}

// ── 6. Input & Game State ────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup', e => { keys[e.code] = false; });

let gameOver = false, score = 0, lastTime = performance.now();

function resetGame() {
    gameOver = false;
    score = 0;
    carState.pos.set(0, 0.5, 0);
    carState.yaw = 0;
    carState.speed = 0;
    initObstacles();
    document.getElementById('gameover').style.display = 'none';
}

initObstacles();

// ── 7. Render Loop ───────────────────────────────────────────────
function animate() {
    requestAnimationFrame(animate);
    
    const ts = performance.now();
    const dt = Math.min((ts - lastTime) / 1000, 0.05);
    lastTime = ts;
    
    if (!gameOver) {
        // Input logic
        const fb = (keys['KeyW'] || keys['ArrowUp']) ? 1 : (keys['KeyS'] || keys['ArrowDown']) ? -1 : 0;
        const lr = (keys['KeyA'] || keys['ArrowLeft']) ? 1 : (keys['KeyD'] || keys['ArrowRight']) ? -1 : 0;
        
        updateCar(dt, fb, lr);
        updateEnv();
        
        score = Math.max(0, Math.floor(carState.pos.z));
        document.getElementById('score').textContent = score;
        document.getElementById('speedval').textContent = Math.abs(Math.floor(carState.speed * 3.6));
        
        // Spawn/Cleanup Obstacles
        if (carState.pos.z + 200 > spawnZ) spawnObstacle();
        
        obstacles = obstacles.filter(o => {
            if (o.mesh.position.z < carState.pos.z - 30) {
                scene.remove(o.mesh);
                return false;
            }
            return true;
        });
        
        // Collision Detection
        for (const o of obstacles) {
            if (checkCollision(o)) {
                gameOver = true;
                document.getElementById('finalscore').textContent = score;
                document.getElementById('gameover').style.display = 'block';
                break;
            }
        }
    }
    
    if (keys['KeyR'] && gameOver) resetGame();
    
    // Cập nhật Camera (Camera Follow)
    const yr = carState.yaw * Math.PI / 180;
    const camDist = 8, camHeight = 3.5;
    camera.position.x = carState.pos.x - Math.sin(yr) * camDist;
    camera.position.y = carState.pos.y + camHeight;
    camera.position.z = carState.pos.z - Math.cos(yr) * camDist;
    camera.lookAt(
        carState.pos.x + Math.sin(yr) * 12,
        carState.pos.y + 0.8,
        carState.pos.z + Math.cos(yr) * 12
    );
    
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
